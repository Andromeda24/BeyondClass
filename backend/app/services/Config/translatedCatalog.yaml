agent:
  name: "ActivitiesCatalogOrchestrator"
  role: "Orchestrator"
  goal: >
    Execute two tasks in sequence:
    1) fetch the activities catalog,
    2) translate it to the requested language.
  backstory: >
    This agent coordinates two internal tasks. It first calls the
    activitiesCatalogAgent to retrieve the catalog, then calls a translation
    agent to translate the results.

tasks:
  - id: "fetch_catalog"
    description: "Fetch the activities catalog using the activitiesCatalogAgent."

  - id: "translate_catalog"
    description: "Translate the fetched catalog using the translation agent."
